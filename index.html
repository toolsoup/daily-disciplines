// ─── Mobile Detection Hook ────────────────────────────────────
function useIsMobile(breakpoint = 640) {
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < breakpoint);
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < breakpoint);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [breakpoint]);
  return isMobile;
}

// ─── Storage Helpers ──────────────────────────────────────────
function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}

function saveJSON(key, data) {
  localStorage.setItem(key, JSON.stringify(data));
}

function monthKey(year, month) {
  return `${year}-${String(month + 1).padStart(2, '0')}`;
}

function loadConfig() {
  return loadJSON('dd-config', null) || JSON.parse(JSON.stringify(DEFAULT_CONFIG));
}

function saveConfig(config) {
  saveJSON('dd-config', config);
}

function loadChecks(year, month) {
  return loadJSON(`dd-checks-${monthKey(year, month)}`, {});
}

function saveChecks(year, month, data) {

}

function loadMetrics(year, month) {

// ─── useAuth Hook ────────────────────────────────────────────
function useAuth() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    const unsub = firebaseAuth.onAuthStateChanged((u) => {
      setUser(u);
      setLoading(false);
    });
    return unsub;
  }, []);

  const signIn = useCallback(async () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    try {
      await firebaseAuth.signInWithPopup(provider);
    } catch (err) {
      console.error('Sign-in error:', err);
    }
  }, []);

  const signOut = useCallback(async () => {
    try {
      await firebaseAuth.signOut();
    } catch (err) {
      console.error('Sign-out error:', err);
    }
  }, []);

  return { user, loading, signIn, signOut };
}

// ─── Cloud Storage (Firestore) ───────────────────────────────
function firestoreConfigRef(uid) {
  return db.collection('users').doc(uid).collection('data').doc('config');
}

function firestoreMonthRef(uid, year, month) {
  return db.collection('users').doc(uid).collection('months').doc(monthKey(year, month));
}

async function saveConfigCloud(config, uid) {
  saveConfig(config);
  if (!uid) return;
  try {
    await firestoreConfigRef(uid).set({ categories: config.categories }, { merge: true });
  } catch (err) { console.error('Cloud config save error:', err); }
}

async function saveMonthCloud(year, month, checks, metrics, notes, uid, journal) {
  saveChecks(year, month, checks);
  saveMetrics(year, month, metrics);
  saveNotes(year, month, notes);
  if (journal !== undefined) saveJournal(year, month, journal);
  if (!uid) return;
  try {
    const data = { checks, metrics, notes };
    if (journal !== undefined) data.journal = journal;
    await firestoreMonthRef(uid, year, month).set(data, { merge: true });
  } catch (err) { console.error('Cloud month save error:', err); }
}

async function loadConfigCloud(uid) {
  try {
    const snap = await firestoreConfigRef(uid).get();
    if (snap.exists) return snap.data();
  } catch (err) { console.error('Cloud config load error:', err); }
  return null;
}

async function loadMonthCloud(uid, year, month) {
  try {
    const snap = await firestoreMonthRef(uid, year, month).get();
    if (snap.exists) return snap.data();
  } catch (err) { console.error('Cloud month load error:', err); }
  return null;
}

// Migrate all localStorage dd-* data to Firestore on first sign-in
async function migrateLocalToCloud(uid) {
  // Upload config
  const config = loadConfig();
  await firestoreConfigRef(uid).set({ categories: config.categories }, { merge: true });

  // Find all dd-checks-*, dd-metrics-*, dd-notes-* keys
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key) continue;
    const checksMatch = key.match(/^dd-checks-(\d{4})-(\d{2})$/);
    const metricsMatch = key.match(/^dd-metrics-(\d{4})-(\d{2})$/);
    const notesMatch = key.match(/^dd-notes-(\d{4})-(\d{2})$/);
    const journalMatch = key.match(/^dd-journal-(\d{4})-(\d{2})$/);

    if (checksMatch || metricsMatch || notesMatch || journalMatch) {
      const match = checksMatch || metricsMatch || notesMatch || journalMatch;
      const mk = `${match[1]}-${match[2]}`;
      const ref = db.collection('users').doc(uid).collection('months').doc(mk);
      const data = {};
      const checksKey = `dd-checks-${mk}`;
      const metricsKey = `dd-metrics-${mk}`;
      const notesKey = `dd-notes-${mk}`;
      const journalKey = `dd-journal-${mk}`;
      if (localStorage.getItem(checksKey)) data.checks = JSON.parse(localStorage.getItem(checksKey));
      if (localStorage.getItem(metricsKey)) data.metrics = JSON.parse(localStorage.getItem(metricsKey));
      if (localStorage.getItem(notesKey)) data.notes = JSON.parse(localStorage.getItem(notesKey));
      if (localStorage.getItem(journalKey)) data.journal = JSON.parse(localStorage.getItem(journalKey));
      if (Object.keys(data).length > 0) {
        await ref.set(data, { merge: true });
      }
    }
  }
}

const DAY_ABBR = ['S','M','T','W','T','F','S'];

const WEEK_COLORS = ['#3B82F6', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899'];

function getWeekNumber(year, month, day) {
  const d = new Date(year, month, day);
  d.setHours(0, 0, 0, 0);
  d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
  const week1 = new Date(d.getFullYear(), 0, 4);
  return 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
}

function computeWeekGroups(year, month, daysInMonth) {
  const groups = [];
  let currentWeek = -1;
  let colorIdx = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const wn = getWeekNumber(year, month, d);
    if (wn !== currentWeek) {
      groups.push({ weekNum: wn, startDay: d, endDay: d, color: WEEK_COLORS[colorIdx % WEEK_COLORS.length] });
      currentWeek = wn;
      colorIdx++;
    } else {
      groups[groups.length - 1].endDay = d;
    }
  }
  groups.forEach(g => { g.colSpan = g.endDay - g.startDay + 1; });
  return groups;
}

function getDayOfWeek(year, month, day) {
  return new Date(year, month, day).getDay();
}

          {!isMobile && <div style={{ color: '#94A3B8', fontSize: 12 }}>{card.sub}</div>}
        </div>
      ))}
    </div>
  );
}

// ─── Daily Chart ──────────────────────────────────────────────
function DailyChart({ dailyData }) {

  return (
    <div style={{ background: '#1A1F35', borderRadius: 12, padding: isMobile ? 12 : 24, marginBottom: isMobile ? 12 : 24 }}>
      <h2 style={{ fontSize: isMobile ? 15 : 18, fontWeight: 600, color: '#E2E8F0', marginBottom: isMobile ? 8 : 16 }}>Daily Completion Rate</h2>
      <ResponsiveContainer width="100%" height={isMobile ? 160 : 250}>
        <AreaChart data={dailyData} margin={{ top: 5, right: 20, left: 0, bottom: 5 }}>
          <defs>
            <linearGradient id="colorPct" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stopColor="#3B82F6" stopOpacity={0.3} />
              <stop offset="95%" stopColor="#3B82F6" stopOpacity={0} />
            </linearGradient>
          </defs>
          <CartesianGrid strokeDasharray="3 3" stroke="#252B45" />
          <XAxis dataKey="day" stroke="#94A3B8" fontSize={12} tickLine={false} />

          <Tooltip contentStyle={{ background: '#1A1F35', border: '1px solid #252B45', borderRadius: 8, color: '#E2E8F0' }} labelFormatter={v => `Day ${v}`} formatter={v => [`${v}%`, 'Completion']} />
          <ReferenceLine y={80} stroke="#FFD700" strokeDasharray="5 5" label={{ value: '80% goal', fill: '#FFD700', fontSize: 11, position: 'right' }} />
          <Area type="monotone" dataKey="pct" stroke="#3B82F6" strokeWidth={2} fill="url(#colorPct)" dot={{ fill: '#3B82F6', r: 3 }} activeDot={{ r: 5, fill: '#3B82F6' }} />
        </AreaChart>
      </ResponsiveContainer>
    </div>
  );
}

// ─── Habit Grid ───────────────────────────────────────────────
function HabitGrid({ config, checks, metrics, toggleCheck, setMetric, collapsed, toggleCollapse, daysInMonth, habitStats, month, year }) {
  const isMobile = useIsMobile();
  const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
  const NAME_W = isMobile ? 100 : 150;
  const CELL_W = isMobile ? 36 : 28;
  const CELL_GAP = 1;
  const STATS_W = isMobile ? 0 : 196;
  const MONDAY_SEP = isMobile ? 2 : 6;

  const now = new Date();
  const isCurrentMonth = month === now.getMonth() && year === now.getFullYear();
  const today = isCurrentMonth ? now.getDate() : -1;
  const isFutureMonth = year > now.getFullYear() || (year === now.getFullYear() && month > now.getMonth());

  const weekGroups = useMemo(() => computeWeekGroups(year, month, daysInMonth), [year, month, daysInMonth]);

  // Map day -> week color for quick lookup
  const dayWeekColor = useMemo(() => {
    const map = {};
    weekGroups.forEach(g => {
      for (let d = g.startDay; d <= g.endDay; d++) map[d] = g.color;
    });
    return map;
  }, [weekGroups]);

  // Boolean habits for summary rows
  const boolHabits = useMemo(() =>
    config.categories.flatMap(c => c.habits.filter(h => h.type !== 'number')),
    [config]
  );

  // Per-day summary stats
  const daySummary = useMemo(() => {
    const result = {};
    days.forEach(d => {
      let completed = 0, total = boolHabits.length;
      boolHabits.forEach(h => { if (checks[cellKey(h.id, d)]) completed++; });
      result[d] = { completed, incomplete: total - completed, pct: total > 0 ? Math.round((completed / total) * 100) : 0 };
    });
    return result;
  }, [days, boolHabits, checks]);

  // Compute total grid width for day columns (no flex stretch)
  const mondayCount = days.filter(d => getDayOfWeek(year, month, d) === 1 && d > 1).length;
  const DAYS_W = daysInMonth * (CELL_W + CELL_GAP) - CELL_GAP + mondayCount * MONDAY_SEP;

  return (
    <div style={{ background: '#1A1F35', borderRadius: 12, marginBottom: isMobile ? 12 : 24 }}>
      <h2 style={{ fontSize: isMobile ? 15 : 18, fontWeight: 600, color: '#E2E8F0', marginBottom: isMobile ? 8 : 16, padding: isMobile ? '12px 8px 0' : '24px 16px 0' }}>Habit Grid</h2>
      <div style={{ overflowX: 'auto', padding: isMobile ? '0 0 12px 0' : '0 16px 24px 16px', WebkitOverflowScrolling: 'touch' }}>
      <div style={{ display: 'inline-flex', flexDirection: 'column', minWidth: '100%' }}>
        {/* Week band header row */}
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 0 }}>
          <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4 }} />
          <div style={{ display: 'flex', gap: 0, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
            {weekGroups.map((g, gi) => {
              // Calculate total width: colSpan cells + gaps + Monday separators
              let totalW = g.colSpan * (CELL_W + CELL_GAP) - CELL_GAP;
              // Add Monday separator gap for any Monday in this group (except day 1)
              for (let d = g.startDay; d <= g.endDay; d++) {
                const dow = getDayOfWeek(year, month, d);
                if (dow === 1 && d > 1) totalW += MONDAY_SEP;
              }
              return (
                <div key={g.weekNum} style={{
                  width: totalW, minWidth: totalW, textAlign: 'center',
                  background: g.color + '30', color: g.color,
                  fontSize: 12, fontWeight: 700, padding: '4px 0',
                  borderRadius: gi === 0 ? '4px 0 0 4px' : gi === weekGroups.length - 1 ? '0 4px 4px 0' : 0,
                  borderRight: gi < weekGroups.length - 1 ? '1px solid #1A1F35' : 'none',
                  marginLeft: gi > 0 ? 1 : 0,
                }}>
                  Wk {g.weekNum}
                </div>
              );
            })}
          </div>
          {!isMobile && <div style={{ width: STATS_W, minWidth: STATS_W, flexShrink: 0, marginLeft: 8 }} />}
        </div>

        {/* Day-of-week header row */}
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 0 }}>
          <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4 }} />
          <div style={{ display: 'flex', gap: CELL_GAP, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
            {days.map(d => {
              const dow = getDayOfWeek(year, month, d);
              const isMonday = dow === 1 && d > 1;
              const isWeekend = dow === 0 || dow === 6;
              const wc = dayWeekColor[d];
              return (
                <div key={d} style={{
                  width: CELL_W, minWidth: CELL_W, textAlign: 'center',
                  color: isWeekend ? '#E9456080' : wc + 'AA',
                  fontSize: 11, fontWeight: isWeekend ? 700 : 500,
                  marginLeft: isMonday ? MONDAY_SEP : 0,
                  background: wc + '10', borderRadius: 2,
                }}>
                  {DAY_ABBR[dow]}
                </div>
              );
            })}
          </div>
          {!isMobile && <div style={{ width: STATS_W, minWidth: STATS_W, flexShrink: 0, marginLeft: 8 }} />}
        </div>

        {/* Day number header row */}
        <div style={{ display: 'flex', alignItems: 'center', marginBottom: 4 }}>
          <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4 }}>
            <span style={{ color: '#94A3B8', fontSize: 12, fontWeight: 600 }}>HABIT</span>
          </div>
          <div style={{ display: 'flex', gap: CELL_GAP, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
            {days.map(d => {
              const dow = getDayOfWeek(year, month, d);
              const isMonday = dow === 1 && d > 1;
              const isToday = d === today;
              const wc = dayWeekColor[d];
              return (
                <div key={d} style={{
                  width: CELL_W, minWidth: CELL_W, textAlign: 'center', fontSize: 12, fontWeight: isToday ? 700 : 500,
                  color: isToday ? '#fff' : wc + 'BB',
                  marginLeft: isMonday ? MONDAY_SEP : 0,
                  background: wc + '10', borderRadius: 2,
                }}>
                  {isToday ? (
                    <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 20, height: 20, borderRadius: '50%', background: '#3B82F6', fontSize: 12, fontWeight: 700, color: '#fff' }}>{d}</span>
                  ) : d}
                </div>
              );
            })}
          </div>
          {!isMobile && <div style={{ display: 'flex', marginLeft: 8, width: STATS_W, minWidth: STATS_W, flexShrink: 0 }}>
            <span style={{ color: '#94A3B8', fontSize: 11, fontWeight: 600, width: 36, textAlign: 'center' }}>SUM</span>
            <span style={{ color: '#94A3B8', fontSize: 11, fontWeight: 600, width: 36, textAlign: 'center', borderLeft: '1px solid #374151', paddingLeft: 4 }}>GOAL</span>
            <span style={{ color: '#94A3B8', fontSize: 11, fontWeight: 600, width: 72, textAlign: 'center', borderLeft: '1px solid #374151', paddingLeft: 4 }}>PROG</span>
            <span style={{ color: '#94A3B8', fontSize: 11, fontWeight: 600, width: 44, textAlign: 'center', borderLeft: '1px solid #374151', paddingLeft: 4 }}>STREAK</span>
          </div>}
        </div>

        {config.categories.map(cat => {
          const isCollapsed = collapsed.has(cat.id);
          return (
            <div key={cat.id}>
              <div onClick={() => toggleCollapse(cat.id)} style={{ display: 'flex', alignItems: 'center', padding: '6px 0', cursor: 'pointer', borderBottom: `2px solid ${cat.color}20`, marginBottom: 2, userSelect: 'none' }}>
                <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, display: 'flex', alignItems: 'center', gap: 6 }}>
                  <span style={{ color: cat.color, fontSize: 9, transform: isCollapsed ? 'rotate(-90deg)' : 'rotate(0deg)', transition: 'transform 200ms', display: 'inline-block' }}>{'\u25BC'}</span>
                  <span style={{ color: cat.color, fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1 }}>{cat.name}</span>
                </div>
              </div>

              {!isCollapsed && cat.habits.map(habit => {
                const stats = habitStats[habit.id] || { done: 0, pct: 0, remaining: 0, streak: 0, sum: 0, avg: 0, entries: 0 };
                const isNumber = habit.type === 'number';
                const sumVal = isNumber ? (stats.entries > 0 ? stats.avg : '\u2014') : stats.done;
                const goalVal = isNumber ? (habit.goal || '\u2014') : (stats.goal || daysInMonth);
                return (
                  <div key={habit.id} style={{ display: 'flex', alignItems: 'center', padding: '3px 0', transition: 'background 150ms' }}
                    onMouseEnter={e => e.currentTarget.style.background = '#252B4540'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                  >
                    <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4, display: 'flex', alignItems: 'center', gap: 4, overflow: 'hidden' }}>
                      <span style={{ color: '#E2E8F0', fontSize: isMobile ? 11 : 12, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{habit.name}</span>
                      {isNumber && (
                        <span style={{ color: '#94A3B8', fontSize: 9, flexShrink: 0 }}>{habit.unit}</span>
                      )}
                    </div>
                    <div style={{ display: 'flex', gap: CELL_GAP, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
                      {days.map(d => {
                        const key = cellKey(habit.id, d);
                        const dow = getDayOfWeek(year, month, d);
                        const isMonday = dow === 1 && d > 1;
                        const isToday = d === today;
                        const isFuture = isFutureMonth || (isCurrentMonth && d > today);
                        const todayBg = isToday ? 'rgba(59,130,246,0.08)' : undefined;
                        const weekTint = dayWeekColor[d] + '0D'; // ~5% opacity
                        if (isNumber) {
                          const val = metrics[key];
                          return (
                            <input
                              key={d}
                              type="text"
                              inputMode="decimal"
                              disabled={isFuture}
                              style={{
                                width: CELL_W, minWidth: CELL_W, height: 26,
                                background: isFuture ? '#1A1F35' : (val !== undefined && val !== '' ? 'rgba(59,130,246,0.15)' : (todayBg || weekTint)),
                                color: '#E2E8F0', border: `1px solid ${val !== undefined && val !== '' ? '#3B82F6' : '#374151'}`,
                                borderRadius: 3, textAlign: 'center', fontSize: 10, outline: 'none', padding: 0,
                                opacity: isFuture ? 0.3 : 1, cursor: isFuture ? 'not-allowed' : 'text',
                                marginLeft: isMonday ? MONDAY_SEP : 0, borderLeft: isMonday ? '2px solid #374151' : undefined,
                              }}
                              value={val !== undefined ? val : ''}
                              onChange={e => {
                                const v = e.target.value;
                                if (v === '' || /^-?\d*\.?\d*$/.test(v)) {
                                  setMetric(key, v === '' ? undefined : v);
                                }
                              }}
                              onBlur={e => {
                                const v = e.target.value;
                                if (v !== '' && !isNaN(parseFloat(v))) {
                                  setMetric(key, parseFloat(v));
                                } else if (v === '') {
                                  setMetric(key, undefined);
                                }
                              }}
                            />
                          );
                        }
                        const checked = !!checks[key];
                        return (
                          <div key={d} onClick={() => !isFuture && toggleCheck(key)} style={{
                            width: CELL_W, minWidth: CELL_W, height: 26, display: 'flex', alignItems: 'center', justifyContent: 'center',
                            cursor: isFuture ? 'not-allowed' : 'pointer', borderRadius: 3,
                            background: isFuture ? '#1A1F35' : (checked ? `${cat.color}25` : (todayBg || weekTint)),
                            border: `1px solid ${checked ? cat.color : '#374151'}`,
                            transition: 'all 150ms',
                            opacity: isFuture ? 0.3 : 1,
                            marginLeft: isMonday ? MONDAY_SEP : 0, borderLeft: isMonday ? '2px solid #374151' : undefined,
                          }}>
                            {checked && <span style={{ color: cat.color, fontSize: 13, fontWeight: 700 }}>{'\u2713'}</span>}
                          </div>
                        );
                      })}
                    </div>
                    {!isMobile && <div style={{ display: 'flex', marginLeft: 8, alignItems: 'center', width: STATS_W, minWidth: STATS_W, flexShrink: 0 }}>
                      <span style={{ color: '#E2E8F0', fontSize: 11, fontWeight: 600, width: 36, textAlign: 'center' }}>
                        {isNumber ? (typeof sumVal === 'number' ? (sumVal % 1 === 0 ? sumVal : sumVal.toFixed(1)) : sumVal) : sumVal}
                      </span>
                      <span style={{ color: '#94A3B8', fontSize: 11, width: 36, textAlign: 'center', borderLeft: '1px solid #374151', paddingLeft: 4 }}>
                        {goalVal}
                      </span>
                      <div style={{ width: 72, display: 'flex', alignItems: 'center', gap: 3, borderLeft: '1px solid #374151', paddingLeft: 4 }}>
                        <div style={{ width: 46, height: 7, background: '#252B45', borderRadius: 3, overflow: 'hidden' }}>
                          <div style={{ height: '100%', borderRadius: 3, background: cat.color, width: `${Math.min(stats.pct, 100)}%`, transition: 'width 300ms ease' }} />
                        </div>
                        <span style={{ color: '#94A3B8', fontSize: 10, width: 24 }}>{stats.pct}%</span>
                      </div>
                      <div style={{ borderLeft: '1px solid #374151', paddingLeft: 4, width: 44, display: 'flex', justifyContent: 'center' }}>
                        {stats.streak >= 2 ? (
                          <span className="streak-badge">{'\u{1F525}'}{stats.streak}</span>
                        ) : null}
                      </div>
                    </div>}
                  </div>
                );
              })}
            </div>
          );
        })}

        {/* ── Summary Rows ── */}
        {boolHabits.length > 0 && (
          <div style={{ borderTop: '2px solid #374151', marginTop: 8, paddingTop: 6 }}>
            {/* Completed per day */}
            <div style={{ display: 'flex', alignItems: 'center', padding: '2px 0' }}>
              <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4 }}>
                <span style={{ color: '#10B981', fontSize: 11, fontWeight: 600 }}>COMPLETED</span>
              </div>
              <div style={{ display: 'flex', gap: CELL_GAP, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
                {days.map(d => {
                  const isMonday = getDayOfWeek(year, month, d) === 1 && d > 1;
                  return (
                    <div key={d} style={{ width: CELL_W, minWidth: CELL_W, textAlign: 'center', fontSize: 11, color: '#10B981', fontWeight: 600, marginLeft: isMonday ? MONDAY_SEP : 0 }}>
                      {daySummary[d].completed}
                    </div>
                  );
                })}
              </div>
              {!isMobile && <div style={{ width: STATS_W, minWidth: STATS_W, flexShrink: 0, marginLeft: 8 }}>
                <span style={{ color: '#10B981', fontSize: 11, fontWeight: 700, display: 'inline-block', width: 36, textAlign: 'center' }}>
                  {Object.values(daySummary).reduce((a, s) => a + s.completed, 0)}
                </span>
              </div>}
            </div>

            {/* Incomplete per day */}
            <div style={{ display: 'flex', alignItems: 'center', padding: '2px 0' }}>
              <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4 }}>
                <span style={{ color: '#EF4444', fontSize: 11, fontWeight: 600 }}>INCOMPLETE</span>
              </div>
              <div style={{ display: 'flex', gap: CELL_GAP, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
                {days.map(d => {
                  const isMonday = getDayOfWeek(year, month, d) === 1 && d > 1;
                  return (
                    <div key={d} style={{ width: CELL_W, minWidth: CELL_W, textAlign: 'center', fontSize: 11, color: '#EF4444', fontWeight: 600, marginLeft: isMonday ? MONDAY_SEP : 0 }}>
                      {daySummary[d].incomplete}
                    </div>
                  );
                })}
              </div>
              {!isMobile && <div style={{ width: STATS_W, minWidth: STATS_W, flexShrink: 0, marginLeft: 8 }}>
                <span style={{ color: '#EF4444', fontSize: 11, fontWeight: 700, display: 'inline-block', width: 36, textAlign: 'center' }}>
                  {Object.values(daySummary).reduce((a, s) => a + s.incomplete, 0)}
                </span>
              </div>}
            </div>

            {/* Daily % */}
            <div style={{ display: 'flex', alignItems: 'center', padding: '2px 0' }}>
              <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4 }}>
                <span style={{ color: '#94A3B8', fontSize: 11, fontWeight: 600 }}>DAILY %</span>
              </div>
              <div style={{ display: 'flex', gap: CELL_GAP, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
                {days.map(d => {
                  const isMonday = getDayOfWeek(year, month, d) === 1 && d > 1;
                  const pct = daySummary[d].pct;
                  return (
                    <div key={d} style={{ width: CELL_W, minWidth: CELL_W, textAlign: 'center', fontSize: 10, color: '#E2E8F0', fontWeight: 600, marginLeft: isMonday ? MONDAY_SEP : 0 }}>
                      {pct}%
                    </div>
                  );
                })}
              </div>
              {!isMobile && <div style={{ width: STATS_W, minWidth: STATS_W, flexShrink: 0, marginLeft: 8 }} />}
            </div>

            {/* Weekly summary row */}
            <div style={{ display: 'flex', alignItems: 'center', padding: '4px 0', marginTop: 2 }}>
              <div className="freeze-col" style={{ width: NAME_W, minWidth: NAME_W, flexShrink: 0, paddingRight: 4 }}>
                <span style={{ color: '#94A3B8', fontSize: 11, fontWeight: 600 }}>WEEKLY</span>
              </div>
              <div style={{ display: 'flex', gap: 0, width: DAYS_W, minWidth: DAYS_W, flexShrink: 0 }}>
                {weekGroups.map((g, gi) => {
                  let totalW = g.colSpan * (CELL_W + CELL_GAP) - CELL_GAP;
                  for (let d = g.startDay; d <= g.endDay; d++) {
                    if (getDayOfWeek(year, month, d) === 1 && d > 1) totalW += MONDAY_SEP;
                  }
                  let weekCompleted = 0, weekTotal = 0;
                  for (let d = g.startDay; d <= g.endDay; d++) {
                    weekCompleted += daySummary[d].completed;
                    weekTotal += daySummary[d].completed + daySummary[d].incomplete;
                  }
                  const weekPct = weekTotal > 0 ? Math.round((weekCompleted / weekTotal) * 100) : 0;
                  return (
                    <div key={g.weekNum} style={{
                      width: totalW, minWidth: totalW, textAlign: 'center',
                      background: g.color + '20', color: g.color,
                      fontSize: 11, fontWeight: 700, padding: '4px 0',
                      borderRadius: gi === 0 ? '3px 0 0 3px' : gi === weekGroups.length - 1 ? '0 3px 3px 0' : 0,
                      borderRight: gi < weekGroups.length - 1 ? '1px solid #1A1F35' : 'none',
                      marginLeft: gi > 0 ? 1 : 0,
                    }}>
                      {weekCompleted}/{weekTotal} ({weekPct}%)
                    </div>
                  );
                })}
              </div>
              {!isMobile && <div style={{ width: STATS_W, minWidth: STATS_W, flexShrink: 0, marginLeft: 8 }} />}
            </div>
          </div>
        )}
      </div>
      </div>
    </div>
  );
}

// ─── Monthly & Weekly Goals ──────────────────────────────────
function GoalsPanel({ month, year }) {
  const storageKey = `dd-goals-${monthKey(year, month)}`;
  const [goals, setGoals] = useState(() => loadJSON(storageKey, {
    monthly: [
      { id: 1, text: '', done: false },
      { id: 2, text: '', done: false },
      { id: 3, text: '', done: false },
    ],
    weekly: [
      { id: 1, text: '', done: false },
      { id: 2, text: '', done: false },
      { id: 3, text: '', done: false },
    ],
  }));

  // Reload when month changes
  useEffect(() => {
    setGoals(loadJSON(storageKey, {
      monthly: [
        { id: 1, text: '', done: false },
        { id: 2, text: '', done: false },
        { id: 3, text: '', done: false },
      ],
      weekly: [
        { id: 1, text: '', done: false },
        { id: 2, text: '', done: false },
        { id: 3, text: '', done: false },
      ],
    }));
  }, [storageKey]);

  const save = (updated) => { setGoals(updated); saveJSON(storageKey, updated); };

  const updateGoal = (type, id, field, value) => {
    const updated = { ...goals, [type]: goals[type].map(g => g.id === id ? { ...g, [field]: value } : g) };
    save(updated);
  };

  const addGoal = (type) => {
    if (goals[type].length >= 5) return;
    const nextId = Math.max(0, ...goals[type].map(g => g.id)) + 1;
    save({ ...goals, [type]: [...goals[type], { id: nextId, text: '', done: false }] });
  };

  const removeGoal = (type, id) => {
    if (goals[type].length <= 1) return;
    save({ ...goals, [type]: goals[type].filter(g => g.id !== id) });
  };

  const renderSection = (title, type, color) => {
    const items = goals[type];
    const doneCount = items.filter(g => g.done && g.text.trim()).length;
    const totalWithText = items.filter(g => g.text.trim()).length;
    return (
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <span style={{ color, fontSize: 14, fontWeight: 700 }}>{title}</span>
            {totalWithText > 0 && (
              <span style={{ color: '#94A3B8', fontSize: 11 }}>{doneCount}/{totalWithText}</span>
            )}
          </div>
          {items.length < 5 && (
            <button onClick={() => addGoal(type)} style={{
              background: 'none', border: `1px solid ${color}40`, color, fontSize: 11,
              borderRadius: 4, padding: '2px 8px', cursor: 'pointer',
            }}>+ Add</button>
          )}
        </div>
        {items.map((g, i) => (
          <div key={g.id} style={{
            display: 'flex', alignItems: 'center', gap: 8, padding: '6px 0',
            borderBottom: i < items.length - 1 ? '1px solid #252B45' : 'none',
          }}>
            <div
              onClick={() => updateGoal(type, g.id, 'done', !g.done)}
              style={{
                width: 20, height: 20, borderRadius: 4, flexShrink: 0, cursor: 'pointer',
                border: `2px solid ${g.done ? color : '#374151'}`,
                background: g.done ? color + '25' : 'transparent',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}
            >
              {g.done && <span style={{ color, fontSize: 12, fontWeight: 700 }}>{'\u2713'}</span>}
            </div>
            <input
              type="text"
              value={g.text}
              onChange={e => updateGoal(type, g.id, 'text', e.target.value)}
              placeholder={`${title.split(' ')[0]} goal ${i + 1}...`}
              style={{
                flex: 1, background: 'transparent', border: 'none', outline: 'none',
                color: g.done ? '#94A3B8' : '#E2E8F0', fontSize: 13,
                textDecoration: g.done ? 'line-through' : 'none',
              }}
            />
            {items.length > 1 && (
              <span onClick={() => removeGoal(type, g.id)} style={{ color: '#94A3B840', fontSize: 14, cursor: 'pointer', flexShrink: 0 }}>{'\u00D7'}</span>
            )}
          </div>
        ))}
      </div>
    );
  };

  return (
    <div style={{ background: '#1A1F35', borderRadius: 12, padding: 24, marginBottom: 24 }}>
      <h2 style={{ fontSize: 18, fontWeight: 600, color: '#E2E8F0', marginBottom: 16 }}>Goals</h2>
      <div style={{ display: 'flex', gap: 32, flexWrap: 'wrap' }}>
        {renderSection('Monthly Goals', 'monthly', '#3B82F6')}
        {renderSection('Weekly Goals', 'weekly', '#10B981')}
      </div>
    </div>
  );
}

// ─── Metrics Dashboard ────────────────────────────────────────
function MetricsDashboard({ config, metrics, daysInMonth }) {
  const numberHabits = config.categories.flatMap(c =>
    c.habits.filter(h => h.type === 'number').map(h => ({ ...h, catColor: c.color, catName: c.name }))
  );

  if (numberHabits.length === 0) return null;

  const metricStats = numberHabits.map(h => {
    const values = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const val = metrics[cellKey(h.id, d)];
      if (val !== undefined && val !== '') {
        values.push({ day: d, value: typeof val === 'number' ? val : parseFloat(val) });
      }
    }
    const nums = values.map(v => v.value).filter(v => !isNaN(v));
    const sum = nums.reduce((a, b) => a + b, 0);
    const avg = nums.length > 0 ? sum / nums.length : 0;
    const min = nums.length > 0 ? Math.min(...nums) : 0;
    const max = nums.length > 0 ? Math.max(...nums) : 0;
    const first = nums.length > 0 ? nums[0] : null;
    const last = nums.length > 0 ? nums[nums.length - 1] : null;
    const trend = first !== null && last !== null ? last - first : 0;
    return { ...h, values, sum, avg, min, max, trend, entries: nums.length };
  });

  return (
    <div style={{ background: '#1A1F35', borderRadius: 12, padding: 24, marginBottom: 24 }}>
      <h2 style={{ fontSize: 18, fontWeight: 600, color: '#E2E8F0', marginBottom: 16 }}>Metrics Dashboard</h2>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(280px, 1fr))', gap: 16 }}>
        {metricStats.map(m => (
          <div key={m.id} style={{ background: '#252B45', borderRadius: 10, padding: 16, borderTop: `3px solid ${m.catColor}` }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div>
                <div style={{ color: '#E2E8F0', fontSize: 15, fontWeight: 600 }}>{m.name}</div>
                <div style={{ color: '#94A3B8', fontSize: 11 }}>{m.catName} &middot; {m.unit}</div>
              </div>
              {m.entries > 0 && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                  <span style={{ color: m.direction === 'down' ? (m.trend <= 0 ? '#00B894' : '#E94560') : (m.trend >= 0 ? '#00B894' : '#E94560'), fontSize: 13, fontWeight: 700 }}>
                    {m.trend > 0 ? '+' : ''}{m.trend.toFixed(1)}
                  </span>
                  <span style={{ fontSize: 11, color: '#94A3B8' }}>{m.unit}</span>
                </div>
              )}
            </div>
            {m.entries > 0 ? (
              <div>
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginBottom: 12 }}>
                  {m.goal ? (
                    <div><div style={{ color: '#94A3B8', fontSize: 10, marginBottom: 2 }}>TOTAL</div><div style={{ color: '#E2E8F0', fontSize: 16, fontWeight: 700 }}>{m.sum.toFixed(0)}<span style={{ color: '#94A3B8', fontSize: 11 }}>/{m.goal}</span></div></div>
                  ) : (
                    <div><div style={{ color: '#94A3B8', fontSize: 10, marginBottom: 2 }}>LATEST</div><div style={{ color: '#E2E8F0', fontSize: 16, fontWeight: 700 }}>{m.values[m.values.length - 1].value.toFixed(1)}</div></div>
                  )}
                  <div><div style={{ color: '#94A3B8', fontSize: 10, marginBottom: 2 }}>AVG</div><div style={{ color: '#E2E8F0', fontSize: 16, fontWeight: 700 }}>{m.avg.toFixed(1)}</div></div>
                  <div><div style={{ color: '#94A3B8', fontSize: 10, marginBottom: 2 }}>ENTRIES</div><div style={{ color: '#E2E8F0', fontSize: 16, fontWeight: 700 }}>{m.entries}</div></div>
                </div>
                {/* Mini sparkline */}
                {m.values.length >= 2 && (
                  <ResponsiveContainer width="100%" height={50}>
                    <LineChart data={m.values} margin={{ top: 2, right: 2, left: 2, bottom: 2 }}>
                      <Line type="monotone" dataKey="value" stroke={m.catColor} strokeWidth={2} dot={false} />
                    </LineChart>
                  </ResponsiveContainer>
                )}
              </div>
            ) : (
              <div style={{ color: '#94A3B8', fontSize: 12, fontStyle: 'italic' }}>No entries yet</div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Leaderboard ──────────────────────────────────────────────
function Leaderboard({ config, habitStats }) {
  const allHabits = flattenHabits(config).filter(h => h.type === 'boolean');
  const sorted = allHabits
    .map(h => ({ ...h, ...(habitStats[h.id] || { done: 0, pct: 0 }) }))
    .sort((a, b) => b.pct - a.pct);

  if (sorted.length === 0) return null;

  return (
    <div style={{ background: '#1A1F35', borderRadius: 12, padding: 24, marginBottom: 24 }}>
      <h2 style={{ fontSize: 18, fontWeight: 600, color: '#E2E8F0', marginBottom: 16 }}>Leaderboard</h2>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {sorted.map((h, idx) => (
          <div key={h.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '8px 12px', borderRadius: 8, background: idx < 3 ? '#252B4540' : 'transparent' }}>
            <span style={{ color: '#94A3B8', fontSize: 13, fontWeight: 600, width: 24 }}>#{idx + 1}</span>
            <span style={{ width: 10, height: 10, borderRadius: '50%', background: h.categoryColor, flexShrink: 0 }} />
            <span style={{ color: '#E2E8F0', fontSize: 13, flex: 1 }}>{h.name}</span>
            <div style={{ width: 80, height: 6, background: '#252B45', borderRadius: 3, overflow: 'hidden' }}>
              <div style={{ height: '100%', borderRadius: 3, background: h.categoryColor, width: `${h.pct}%`, transition: 'width 300ms ease' }} />
            </div>
            <span style={{ color: '#E2E8F0', fontSize: 13, fontWeight: 600, width: 40, textAlign: 'right' }}>{h.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Journal ─────────────────────────────────────────────────
function Journal({ journal, setJournal }) {
  const [draft, setDraft] = useState('');
  const [saving, setSaving] = useState(false);

  const saveEntry = () => {
    const text = draft.trim();
    if (!text) return;
    setSaving(true);
    const entry = { id: uuid(), text, date: new Date().toISOString() };
    setJournal(prev => [entry, ...prev]);
    setDraft('');
    setTimeout(() => setSaving(false), 600);
  };

  const deleteEntry = (id) => {
    setJournal(prev => prev.filter(e => e.id !== id));
  };

  const formatDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  };

  return (
    <div style={{ background: '#1A1F35', borderRadius: 12, padding: 24, marginBottom: 24 }}>
      <h2 style={{ fontSize: 18, fontWeight: 600, color: '#E2E8F0', marginBottom: 16 }}>Journal</h2>
      <textarea
        value={draft}
        onChange={e => setDraft(e.target.value)}
        placeholder="What went well today? What can you improve?"
        style={{ width: '100%', minHeight: 90, background: '#252B45', color: '#E2E8F0', border: '1px solid #374151', borderRadius: 8, padding: 16, fontSize: 14, lineHeight: 1.6, resize: 'vertical', outline: 'none', fontFamily: 'inherit' }}
        onFocus={e => e.target.style.borderColor = '#3B82F6'}
        onBlur={e => e.target.style.borderColor = '#374151'}
        onKeyDown={e => { if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) saveEntry(); }}
      />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 8 }}>
        <span style={{ color: '#64748B', fontSize: 11 }}>{draft.trim() ? 'Cmd+Enter to save' : ''}</span>
        <button onClick={saveEntry} disabled={!draft.trim()} className="btn btn-primary" style={{ padding: '6px 16px', fontSize: 13, opacity: draft.trim() ? 1 : 0.5 }}>
          {saving ? 'Saved!' : 'Save Entry'}
        </button>
      </div>
      {journal.length > 0 && (
        <div style={{ marginTop: 16, maxHeight: 300, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 8 }}>
          {journal.map(entry => (
            <div key={entry.id} style={{ background: '#252B45', borderRadius: 8, padding: '12px 16px', borderLeft: '3px solid #3B82F6' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <span style={{ color: '#94A3B8', fontSize: 11, fontWeight: 600 }}>{formatDate(entry.date)}</span>
                <button onClick={() => deleteEntry(entry.id)} style={{ background: 'none', border: 'none', color: '#64748B', cursor: 'pointer', fontSize: 12, padding: '2px 6px' }} title="Delete entry">{'\u2715'}</button>
              </div>
              <p style={{ color: '#E2E8F0', fontSize: 13, lineHeight: 1.6, whiteSpace: 'pre-wrap', margin: 0 }}>{entry.text}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Settings Panel ───────────────────────────────────────────
function SettingsPanel({ isOpen, onClose, config, setConfig, user, onSignOut }) {
  const [editingCat, setEditingCat] = useState(null);
  const [editingHabit, setEditingHabit] = useState(null);
  const [newCatName, setNewCatName] = useState('');
  const [newCatColor, setNewCatColor] = useState('#3B82F6');
  const [importText, setImportText] = useState('');
  const [showImport, setShowImport] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);

  const addCategory = () => {
    if (!newCatName.trim()) return;
    const updated = { ...config, categories: [...config.categories, { id: uuid(), name: newCatName.trim(), color: newCatColor, habits: [] }] };
    setConfig(updated);
    setNewCatName('');
  };

  const updateCategory = (catId, field, value) => {
    const updated = { ...config, categories: config.categories.map(c => c.id === catId ? { ...c, [field]: value } : c) };
    setConfig(updated);
  };

  const deleteCategory = (catId) => {
    const updated = { ...config, categories: config.categories.filter(c => c.id !== catId) };
    setConfig(updated);
  };

  const moveCat = (catId, dir) => {
    const idx = config.categories.findIndex(c => c.id === catId);
    if ((dir === -1 && idx === 0) || (dir === 1 && idx === config.categories.length - 1)) return;
    const cats = [...config.categories];
    [cats[idx], cats[idx + dir]] = [cats[idx + dir], cats[idx]];
    setConfig({ ...config, categories: cats });
  };

  const addHabit = (catId) => {
    const updated = {
      ...config,
      categories: config.categories.map(c =>
        c.id === catId ? { ...c, habits: [...c.habits, { id: uuid(), name: 'New Habit', type: 'boolean', goal: 30 }] } : c
      ),
    };
    setConfig(updated);
  };

  const updateHabit = (catId, habitId, updates) => {
    const updated = {
      ...config,
      categories: config.categories.map(c =>
        c.id === catId ? { ...c, habits: c.habits.map(h => h.id === habitId ? { ...h, ...updates } : h) } : c
      ),
    };
    setConfig(updated);
  };

  const deleteHabit = (catId, habitId) => {
    const updated = {
      ...config,
      categories: config.categories.map(c =>
        c.id === catId ? { ...c, habits: c.habits.filter(h => h.id !== habitId) } : c
      ),
    };
    setConfig(updated);
    if (editingHabit === habitId) setEditingHabit(null);
  };

  const moveHabit = (catId, habitId, dir) => {
    const cat = config.categories.find(c => c.id === catId);
    const idx = cat.habits.findIndex(h => h.id === habitId);
    if ((dir === -1 && idx === 0) || (dir === 1 && idx === cat.habits.length - 1)) return;
    const habits = [...cat.habits];
    [habits[idx], habits[idx + dir]] = [habits[idx + dir], habits[idx]];
    const updated = { ...config, categories: config.categories.map(c => c.id === catId ? { ...c, habits } : c) };
    setConfig(updated);
  };

  const exportConfig = () => {
    const json = JSON.stringify(config, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `daily-disciplines-config-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importConfig = () => {
    try {
      const parsed = JSON.parse(importText);
      if (parsed.categories && Array.isArray(parsed.categories)) {
        setConfig(parsed);
        setImportText('');
        setShowImport(false);
      } else {
        alert('Invalid config: must have a "categories" array');
      }
    } catch (e) {
      alert('Invalid JSON: ' + e.message);
    }
  };

  const resetDefaults = () => {
    setConfig(JSON.parse(JSON.stringify(DEFAULT_CONFIG)));
    setConfirmReset(false);
  };

  return (
    <>
      <div className={`settings-overlay ${isOpen ? 'open' : ''}`} onClick={onClose} />
      <div className={`settings-drawer ${isOpen ? 'open' : ''}`}>
        <div style={{ padding: 24 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 24 }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, color: '#E2E8F0' }}>Settings</h2>
            <button onClick={onClose} className="btn btn-ghost" style={{ padding: '6px 12px' }}>{'\u2715'}</button>
          </div>

          {/* Categories */}
          <div style={{ marginBottom: 32 }}>
            <h3 style={{ color: '#94A3B8', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Categories & Habits</h3>

            {config.categories.map((cat, catIdx) => (
              <div key={cat.id} style={{ background: '#252B45', borderRadius: 10, padding: 16, marginBottom: 12, borderLeft: `4px solid ${cat.color}` }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                  <input type="color" value={cat.color} onChange={e => updateCategory(cat.id, 'color', e.target.value)} style={{ width: 28, height: 28, border: 'none', borderRadius: 4, cursor: 'pointer', background: 'none' }} />
                  {editingCat === cat.id ? (
                    <input className="input" style={{ flex: 1 }} value={cat.name} onChange={e => updateCategory(cat.id, 'name', e.target.value)} onBlur={() => setEditingCat(null)} onKeyDown={e => e.key === 'Enter' && setEditingCat(null)} autoFocus />
                  ) : (
                    <span style={{ color: '#E2E8F0', fontSize: 15, fontWeight: 600, flex: 1, cursor: 'pointer' }} onClick={() => setEditingCat(cat.id)}>{cat.name}</span>
                  )}
                  <button onClick={() => moveCat(cat.id, -1)} className="btn btn-ghost" style={{ padding: '4px 8px', fontSize: 12 }} disabled={catIdx === 0}>{'\u25B2'}</button>
                  <button onClick={() => moveCat(cat.id, 1)} className="btn btn-ghost" style={{ padding: '4px 8px', fontSize: 12 }} disabled={catIdx === config.categories.length - 1}>{'\u25BC'}</button>
                  <button onClick={() => deleteCategory(cat.id)} className="btn btn-danger" style={{ padding: '4px 10px', fontSize: 12 }}>{'\u2715'}</button>
                </div>

                {/* Habits in this category */}
                <div style={{ marginLeft: 8 }}>
                  {cat.habits.map((habit, hIdx) => (
                    <div key={habit.id} style={{ padding: '6px 0', borderBottom: '1px solid #374151' }}>
                      {editingHabit === habit.id ? (
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                          <div style={{ display: 'flex', gap: 8 }}>
                            <input className="input" value={habit.name} onChange={e => updateHabit(cat.id, habit.id, { name: e.target.value })} placeholder="Habit name" />
                          </div>
                          <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
                            <select className="select" style={{ width: 'auto' }} value={habit.type} onChange={e => {
                              const newType = e.target.value;
                              const updates = { type: newType };
                              if (newType === 'number') { updates.unit = habit.unit || 'units'; updates.direction = habit.direction || 'up'; }
                              updateHabit(cat.id, habit.id, updates);
                            }}>
                              <option value="boolean">Checkbox</option>
                              <option value="number">Number</option>
                            </select>
                            {habit.type === 'number' && (
                              <>
                                <input className="input" style={{ width: 80 }} value={habit.unit || ''} onChange={e => updateHabit(cat.id, habit.id, { unit: e.target.value })} placeholder="Unit" />
                                <select className="select" style={{ width: 'auto' }} value={habit.direction || 'up'} onChange={e => updateHabit(cat.id, habit.id, { direction: e.target.value })}>
                                  <option value="up">Higher is better</option>
                                  <option value="down">Lower is better</option>
                                </select>
                              </>
                            )}
                            <input className="input" style={{ width: 70 }} type="number" value={habit.goal ?? ''} onChange={e => updateHabit(cat.id, habit.id, { goal: e.target.value === '' ? null : Number(e.target.value) })} placeholder="Goal" />
                            <span style={{ color: '#94A3B8', fontSize: 11 }}>goal/mo</span>
                          </div>
                          <button onClick={() => setEditingHabit(null)} className="btn btn-primary" style={{ alignSelf: 'flex-start', padding: '4px 12px', fontSize: 12 }}>Done</button>
                        </div>
                      ) : (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                          <span style={{ color: '#E2E8F0', fontSize: 13, flex: 1, cursor: 'pointer' }} onClick={() => setEditingHabit(habit.id)}>
                            {habit.name}
                            <span style={{ color: '#94A3B8', fontSize: 11, marginLeft: 6 }}>
                              {habit.type === 'number' ? `${habit.unit || ''} \u2022 ${habit.direction || 'up'}` : 'checkbox'}
                              {habit.goal ? ` \u2022 goal: ${habit.goal}` : ''}
                            </span>
                          </span>
                          <button onClick={() => moveHabit(cat.id, habit.id, -1)} className="btn btn-ghost" style={{ padding: '2px 6px', fontSize: 10 }} disabled={hIdx === 0}>{'\u25B2'}</button>
                          <button onClick={() => moveHabit(cat.id, habit.id, 1)} className="btn btn-ghost" style={{ padding: '2px 6px', fontSize: 10 }} disabled={hIdx === cat.habits.length - 1}>{'\u25BC'}</button>
                          <button onClick={() => deleteHabit(cat.id, habit.id)} className="btn btn-danger" style={{ padding: '2px 8px', fontSize: 10 }}>{'\u2715'}</button>
                        </div>
                      )}
                    </div>
                  ))}
                  <button onClick={() => addHabit(cat.id)} className="btn btn-ghost" style={{ marginTop: 8, padding: '4px 12px', fontSize: 12 }}>+ Add Habit</button>
                </div>
              </div>
            ))}

            {/* Add category */}
            <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
              <input type="color" value={newCatColor} onChange={e => setNewCatColor(e.target.value)} style={{ width: 36, height: 36, border: 'none', borderRadius: 4, cursor: 'pointer', background: 'none' }} />
              <input className="input" value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="New category name" onKeyDown={e => e.key === 'Enter' && addCategory()} />
              <button onClick={addCategory} className="btn btn-primary">Add</button>
            </div>
          </div>

          {/* Import / Export */}
          <div style={{ marginBottom: 24 }}>
            <h3 style={{ color: '#94A3B8', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Backup & Restore</h3>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
              <button onClick={exportConfig} className="btn btn-ghost">Export Config</button>
              <button onClick={() => setShowImport(!showImport)} className="btn btn-ghost">Import Config</button>
            </div>
            {showImport && (
              <div style={{ marginTop: 8 }}>
                <textarea className="input" style={{ minHeight: 100, resize: 'vertical', marginBottom: 8, fontFamily: 'monospace', fontSize: 12 }} value={importText} onChange={e => setImportText(e.target.value)} placeholder="Paste JSON config here..." />
                <button onClick={importConfig} className="btn btn-primary">Apply Import</button>
              </div>
            )}
          </div>

          {/* Account */}
          {user && (
            <div style={{ marginBottom: 24 }}>
              <h3 style={{ color: '#94A3B8', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Account</h3>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, background: '#252B45', borderRadius: 10, padding: 16, marginBottom: 8 }}>
                <img src={user.photoURL} alt="" style={{ width: 36, height: 36, borderRadius: '50%' }} referrerPolicy="no-referrer" />
                <div style={{ flex: 1 }}>
                  <div style={{ color: '#E2E8F0', fontSize: 14, fontWeight: 600 }}>{user.displayName}</div>
                  <div style={{ color: '#94A3B8', fontSize: 12 }}>{user.email}</div>
                </div>
                <button onClick={onSignOut} className="btn btn-ghost" style={{ fontSize: 12 }}>Sign Out</button>
              </div>
              <p style={{ color: '#94A3B8', fontSize: 11 }}>Your data syncs to the cloud automatically when signed in.</p>
            </div>
          )}

          {/* Reset */}
          <div>
            <h3 style={{ color: '#94A3B8', fontSize: 12, fontWeight: 700, textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Danger Zone</h3>
            {!confirmReset ? (
              <button onClick={() => setConfirmReset(true)} className="btn btn-danger">Reset to Defaults</button>
            ) : (
              <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                <span style={{ color: '#E94560', fontSize: 13 }}>Are you sure? This resets all categories/habits.</span>
                <button onClick={resetDefaults} className="btn btn-danger">Yes, Reset</button>
                <button onClick={() => setConfirmReset(false)} className="btn btn-ghost">Cancel</button>
              </div>
            )}
          </div>
        </div>
      </div>
    </>
  );
}

// ─── App ──────────────────────────────────────────────────────
function App() {
  const isMobile = useIsMobile();
  const now = new Date();
  const [month, setMonth] = useState(now.getMonth());
  const [year, setYear] = useState(now.getFullYear());
  const [config, setConfigState] = useState(() => loadConfig());
  const [checks, setChecksState] = useState(() => loadChecks(now.getFullYear(), now.getMonth()));
  const [metrics, setMetricsState] = useState(() => loadMetrics(now.getFullYear(), now.getMonth()));
  const [notes, setNotesState] = useState(() => loadNotes(now.getFullYear(), now.getMonth()));
  const [journal, setJournalState] = useState(() => {
    const j = loadJournal(now.getFullYear(), now.getMonth());
    // Migrate old notes as first journal entry if journal is empty
    if (j.length === 0) {
      const oldNotes = loadNotes(now.getFullYear(), now.getMonth());
      if (oldNotes && oldNotes.trim()) {
        const migrated = [{ id: uuid(), text: oldNotes.trim(), date: new Date(now.getFullYear(), now.getMonth(), 1).toISOString() }];
        saveJournal(now.getFullYear(), now.getMonth(), migrated);
        return migrated;
      }
    }
    return j;
  });
  const [collapsed, setCollapsed] = useState(new Set());
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | syncing | synced | error

  const { user, loading: authLoading, signIn, signOut } = useAuth();
  const prevUserRef = useRef(null);

  const daysInMonth = useMemo(() => getDaysInMonth(month, year), [month, year]);
  const allHabits = useMemo(() => flattenHabits(config), [config]);
  const booleanHabits = useMemo(() => allHabits.filter(h => h.type !== 'number'), [allHabits]);

  // ── Cloud sync on auth state change ──
  useEffect(() => {
    if (authLoading) return;
    const wasNull = prevUserRef.current === null;
    prevUserRef.current = user;

    if (!user) {
      setSyncStatus('idle');
      return;
    }

    // User just signed in
    (async () => {
      setSyncStatus('syncing');
      try {
        // Check if cloud data exists
        const cloudConfig = await loadConfigCloud(user.uid);
        if (!cloudConfig) {
          // First login: migrate local data to cloud
          await migrateLocalToCloud(user.uid);
        } else {
          // Returning user: pull cloud data
          const merged = { categories: cloudConfig.categories };
          setConfigState(merged);
          saveConfig(merged);

          const cloudMonth = await loadMonthCloud(user.uid, year, month);
          if (cloudMonth) {
            if (cloudMonth.checks) { setChecksState(cloudMonth.checks); saveChecks(year, month, cloudMonth.checks); }
            if (cloudMonth.metrics) { setMetricsState(cloudMonth.metrics); saveMetrics(year, month, cloudMonth.metrics); }
            if (cloudMonth.notes !== undefined) { setNotesState(cloudMonth.notes); saveNotes(year, month, cloudMonth.notes); }
            if (cloudMonth.journal) { setJournalState(cloudMonth.journal); saveJournal(year, month, cloudMonth.journal); }
          }
        }
        setSyncStatus('synced');
      } catch (err) {
        console.error('Cloud sync error:', err);
        setSyncStatus('error');
      }
    })();
  }, [user, authLoading]);

  // Persist config (local + cloud)
  const setConfig = useCallback((c) => {
    setConfigState(c);
    saveConfigCloud(c, user?.uid);
    if (user) setSyncStatus('synced');
  }, [user]);

  // Load data when month/year changes
  useEffect(() => {
    setChecksState(loadChecks(year, month));
    setMetricsState(loadMetrics(year, month));
    setNotesState(loadNotes(year, month));
    const j = loadJournal(year, month);
    if (j.length === 0) {
      const oldNotes = loadNotes(year, month);
      if (oldNotes && oldNotes.trim()) {
        const migrated = [{ id: uuid(), text: oldNotes.trim(), date: new Date(year, month, 1).toISOString() }];
        saveJournal(year, month, migrated);
        setJournalState(migrated);
      } else {
        setJournalState([]);
      }
    } else {
      setJournalState(j);
    }

    // Also fetch from cloud in background
    if (user) {
      (async () => {
        setSyncStatus('syncing');
        try {
          const cloudMonth = await loadMonthCloud(user.uid, year, month);
          if (cloudMonth) {
            if (cloudMonth.checks) { setChecksState(cloudMonth.checks); saveChecks(year, month, cloudMonth.checks); }
            if (cloudMonth.metrics) { setMetricsState(cloudMonth.metrics); saveMetrics(year, month, cloudMonth.metrics); }
            if (cloudMonth.notes !== undefined) { setNotesState(cloudMonth.notes); saveNotes(year, month, cloudMonth.notes); }
            if (cloudMonth.journal) { setJournalState(cloudMonth.journal); saveJournal(year, month, cloudMonth.journal); }
          }
          setSyncStatus('synced');
        } catch (err) {
          console.error('Cloud load error:', err);
          setSyncStatus('error');
        }
      })();
    }
  }, [month, year]);

  // Debounced cloud save helper
  const cloudSaveTimeout = useRef(null);
  const scheduleCloudSave = useCallback((checksVal, metricsVal, notesVal, journalVal) => {
    if (!user) return;
    clearTimeout(cloudSaveTimeout.current);
    cloudSaveTimeout.current = setTimeout(() => {
      saveMonthCloud(year, month, checksVal, metricsVal, notesVal, user.uid, journalVal);
      setSyncStatus('synced');
    }, 1000);
    setSyncStatus('syncing');
  }, [user, year, month]);

  // Persist checks (local immediately, cloud debounced)
  const setChecks = useCallback((updater) => {
    setChecksState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveChecks(year, month, next);
      // Read current metrics/notes for cloud save
      scheduleCloudSave(next, loadMetrics(year, month), loadNotes(year, month));
      return next;
    });
  }, [year, month, scheduleCloudSave]);

  // Persist metrics (local immediately, cloud debounced)
  const setMetrics = useCallback((updater) => {
    setMetricsState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveMetrics(year, month, next);
      scheduleCloudSave(loadChecks(year, month), next, loadNotes(year, month));
      return next;
    });
  }, [year, month, scheduleCloudSave]);

  // Persist notes (local immediately, cloud debounced)
  const setNotes = useCallback((val) => {
    setNotesState(val);
    saveNotes(year, month, val);
    scheduleCloudSave(loadChecks(year, month), loadMetrics(year, month), val);
  }, [year, month, scheduleCloudSave]);

  // Persist journal (local immediately, cloud debounced)
  const setJournal = useCallback((updater) => {
    setJournalState(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      saveJournal(year, month, next);
      scheduleCloudSave(loadChecks(year, month), loadMetrics(year, month), loadNotes(year, month), next);
      return next;
    });
  }, [year, month, scheduleCloudSave]);

  const toggleCheck = useCallback((key) => {
    setChecks(prev => ({ ...prev, [key]: !prev[key] }));
  }, [setChecks]);

  const setMetric = useCallback((key, value) => {
    setMetrics(prev => {
      const next = { ...prev };
      if (value === undefined) { delete next[key]; } else { next[key] = value; }
      return next;
    });
  }, [setMetrics]);

  const toggleCollapse = useCallback((catId) => {
    setCollapsed(prev => {
      const next = new Set(prev);
      if (next.has(catId)) next.delete(catId); else next.add(catId);
      return next;
    });
  }, []);

  // ── Per-habit stats ──
  const habitStats = useMemo(() => {
    const stats = {};
    allHabits.forEach(h => {
      if (h.type === 'number') {
        let sum = 0; let entries = 0; let streak = 0; let maxStreak = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const val = metrics[cellKey(h.id, d)];
          if (val !== undefined && val !== '') {
            const num = typeof val === 'number' ? val : parseFloat(val);
            if (!isNaN(num)) { sum += num; entries++; streak++; if (streak > maxStreak) maxStreak = streak; }
            else { streak = 0; }
          } else { streak = 0; }
        }
        const goal = h.goal;
        const pct = goal ? Math.round((sum / goal) * 100) : (entries > 0 ? 100 : 0);
        stats[h.id] = { done: entries, pct: Math.min(pct, 100), remaining: goal ? Math.max(0, goal - sum) : 0, streak: maxStreak, sum, avg: entries > 0 ? sum / entries : 0, entries };
      } else {
        let done = 0; let streak = 0; let maxStreak = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          if (checks[cellKey(h.id, d)]) { done++; streak++; if (streak > maxStreak) maxStreak = streak; }
          else { streak = 0; }
        }
        const goal = h.goal && h.goal <= daysInMonth ? h.goal : daysInMonth;
        const pct = goal > 0 ? Math.round((done / goal) * 100) : 0;
        stats[h.id] = { done, pct: Math.min(pct, 100), remaining: Math.max(0, goal - done), streak: maxStreak, goal };
      }
    });
    return stats;
  }, [allHabits, checks, metrics, daysInMonth]);

  // ── Daily stats (boolean habits only) ──
  const dailyData = useMemo(() => {
    const data = [];
    for (let d = 1; d <= daysInMonth; d++) {
      let count = 0;
      booleanHabits.forEach(h => { if (checks[cellKey(h.id, d)]) count++; });
      data.push({ day: d, pct: booleanHabits.length > 0 ? Math.round((count / booleanHabits.length) * 100) : 0, count });
    }
    return data;
  }, [booleanHabits, checks, daysInMonth]);

  // ── Global stats ──
  const { totalDone, totalPossible, overallPct, bestStreak, todayScore, todayTotal } = useMemo(() => {
    let totalDone = 0, totalPossible = 0;
    let bestStreak = { habit: '', count: 0 };

    booleanHabits.forEach(h => {
      const s = habitStats[h.id];
      if (s) {
        totalDone += s.done;
        totalPossible += (s.goal || daysInMonth);
        if (s.streak > bestStreak.count) bestStreak = { habit: h.name, count: s.streak };
      }
    });

    const today = now.getDate();
    let todayScore = 0;
    booleanHabits.forEach(h => { if (checks[cellKey(h.id, today)]) todayScore++; });

    return {
      totalDone, totalPossible,
      overallPct: totalPossible > 0 ? Math.round((totalDone / totalPossible) * 100) : 0,
      bestStreak, todayScore, todayTotal: booleanHabits.length,
    };
  }, [booleanHabits, habitStats, checks, daysInMonth]);

  // ── Weekly summaries ──
  const weeklyData = useMemo(() => {
    const weeks = [];
    let weekNum = 1;
    for (let start = 1; start <= daysInMonth; start += 7) {
      const end = Math.min(start + 6, daysInMonth);
      let done = 0, possible = 0;
      for (let d = start; d <= end; d++) {
        booleanHabits.forEach(h => { possible++; if (checks[cellKey(h.id, d)]) done++; });
      }
      weeks.push({ week: `Wk ${weekNum}`, pct: possible > 0 ? Math.round((done / possible) * 100) : 0, days: `${start}-${end}` });
      weekNum++;
    }
    return weeks;
  }, [booleanHabits, checks, daysInMonth]);

  return (
    <div style={{ maxWidth: 1400, margin: '0 auto', padding: isMobile ? '8px 6px' : '24px 16px' }}>
      <Header month={month} year={year} setMonth={setMonth} setYear={setYear} overallPct={overallPct} onOpenSettings={() => setSettingsOpen(true)} user={user} onSignIn={signIn} syncStatus={syncStatus} />
      <DashboardCards totalDone={totalDone} totalPossible={totalPossible} bestStreak={bestStreak} todayScore={todayScore} todayTotal={todayTotal} />
      <DailyChart dailyData={dailyData} />
      <HabitGrid config={config} checks={checks} metrics={metrics} toggleCheck={toggleCheck} setMetric={setMetric} collapsed={collapsed} toggleCollapse={toggleCollapse} daysInMonth={daysInMonth} habitStats={habitStats} month={month} year={year} />
      <GoalsPanel month={month} year={year} />
      <MetricsDashboard config={config} metrics={metrics} daysInMonth={daysInMonth} />
      <div style={{ display: 'grid', gridTemplateColumns: isMobile ? '1fr' : 'repeat(auto-fit, minmax(400px, 1fr))', gap: isMobile ? 12 : 24 }}>
        <WeeklySummary weeklyData={weeklyData} />
        <Journal journal={journal} setJournal={setJournal} />
      </div>
      <Leaderboard config={config} habitStats={habitStats} />
      <SettingsPanel isOpen={settingsOpen} onClose={() => setSettingsOpen(false)} config={config} setConfig={setConfig} user={user} onSignOut={signOut} />
      <div style={{ textAlign: 'center', padding: '24px 0', color: '#94A3B8', fontSize: 12 }}>
        Daily Disciplines v2 — Built for consistency, not perfection.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
